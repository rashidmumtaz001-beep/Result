<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Board Result Generator (Editable Subjects)</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Ensuring English LTR and a clean font */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f9;
            direction: ltr; /* English LTR */
        }
        input::placeholder {
            text-align: left; /* Alignment for LTR placeholders */
        }
        /* Custom print style for Board Result look */
        @media print {
            body > *:not(#resultCard):not(.modal) {
                display: none;
            }
            #resultCard {
                visibility: visible;
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                padding: 0;
                margin: 0;
                box-shadow: none;
                border: none;
            }
            #resultCard .institute-logo {
                width: 100px;
                height: 100px;
            }
        }
        /* Custom Modal Style */
        .modal {
            display: none;
            position: fixed;
            z-index: 50;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="p-4 md:p-8 flex justify-center">

    <!-- Main Container -->
    <div class="max-w-5xl w-full bg-white shadow-2xl rounded-xl p-6 md:p-10 my-8">
        <h1 class="text-3xl font-bold text-center text-blue-700 mb-6 border-b-2 border-blue-200 pb-3">
            Online Board Result Generator (Editable Subjects)
        </h1>

        <!-- Input Form -->
        <div id="inputForm">
            <h2 class="text-xl font-semibold text-gray-700 mb-4 border-l-4 border-green-500 pl-3">Student & Institute Details</h2>
            
            <!-- Details Grid (Name, Roll No, Class, Institute) - Clearly in Columns -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                <!-- Institute Name is now fully editable by the user -->
                <input type="text" id="instituteName" placeholder="Institute/Board Name" value="Board of Intermediate and Secondary Education" class="p-3 border border-gray-300 rounded-lg">
                <input type="text" id="studentName" placeholder="Student Name" value="Muhammad Ali Khan" class="p-3 border border-gray-300 rounded-lg">
                <input type="text" id="rollNumber" placeholder="Roll Number" value="987654" class="p-3 border border-gray-300 rounded-lg">
                <input type="text" id="className" placeholder="Class/Grade" value="Matric Part I" class="p-3 border border-gray-300 rounded-lg">
                
                <input type="url" id="logoUrl" placeholder="Board/Institute Logo URL (Optional)" value="https://placehold.co/80x80/007bff/ffffff?text=BISE+LOGO" class="p-3 border border-gray-300 rounded-lg col-span-1 md:col-span-2 lg:col-span-1">
                <input type="text" id="dateOfIssue" placeholder="Date of Issue (Optional)" value="15-11-2025" class="p-3 border border-gray-300 rounded-lg">
            </div>

            <h2 class="text-xl font-semibold text-gray-700 mb-4 border-l-4 border-green-500 pl-3 mt-8">Subject Details (9 Subjects)</h2>
            
            <!-- Marks Per Subject Input -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
                <!-- Total Marks Per Subject is now editable by the user -->
                <input type="number" id="marksPerSubject" placeholder="Max Marks Per Subject (e.g., 100)" value="100" min="1" class="p-3 border border-gray-300 rounded-lg font-bold text-center col-span-1">
                <div class="col-span-2 text-sm text-gray-500 flex items-center">
                    <p class="italic">Note: All 9 subjects will have these maximum marks. (Passing Marks = 40% of Max Marks)</p>
                </div>
            </div>

            <!-- Subject Names and Marks Input Grid (9 subjects with editable names) -->
            <div id="subjectInputs" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-3 gap-6 mb-8">
                <!-- Subject 1 -->
                <div class="flex flex-col space-y-2 border p-3 rounded-lg bg-gray-50 shadow-sm">
                    <label for="subjectName_0" class="text-sm font-semibold text-gray-600">Subject Name 1</label>
                    <input type="text" id="subjectName_0" value="Urdu" class="p-2 border border-gray-300 rounded-lg">
                    <label for="subjectMarks_0" class="text-sm font-semibold text-gray-600">Marks Obtained</label>
                    <input type="number" id="subjectMarks_0" min="0" value="78" class="p-3 border border-gray-300 rounded-lg text-center font-bold">
                </div>
                <!-- Subject 2 -->
                <div class="flex flex-col space-y-2 border p-3 rounded-lg bg-gray-50 shadow-sm">
                    <label for="subjectName_1" class="text-sm font-semibold text-gray-600">Subject Name 2</label>
                    <input type="text" id="subjectName_1" value="English" class="p-2 border border-gray-300 rounded-lg">
                    <label for="subjectMarks_1" class="text-sm font-semibold text-gray-600">Marks Obtained</label>
                    <input type="number" id="subjectMarks_1" min="0" value="85" class="p-3 border border-gray-300 rounded-lg text-center font-bold">
                </div>
                <!-- Subject 3 -->
                <div class="flex flex-col space-y-2 border p-3 rounded-lg bg-gray-50 shadow-sm">
                    <label for="subjectName_2" class="text-sm font-semibold text-gray-600">Subject Name 3</label>
                    <input type="text" id="subjectName_2" value="Mathematics" class="p-2 border border-gray-300 rounded-lg">
                    <label for="subjectMarks_2" class="text-sm font-semibold text-gray-600">Marks Obtained</label>
                    <input type="number" id="subjectMarks_2" min="0" value="62" class="p-3 border border-gray-300 rounded-lg text-center font-bold">
                </div>
                <!-- Subject 4 -->
                <div class="flex flex-col space-y-2 border p-3 rounded-lg bg-gray-50 shadow-sm">
                    <label for="subjectName_3" class="text-sm font-semibold text-gray-600">Subject Name 4</label>
                    <input type="text" id="subjectName_3" value="Physics" class="p-2 border border-gray-300 rounded-lg">
                    <label for="subjectMarks_3" class="text-sm font-semibold text-gray-600">Marks Obtained</label>
                    <input type="number" id="subjectMarks_3" min="0" value="90" class="p-3 border border-gray-300 rounded-lg text-center font-bold">
                </div>
                <!-- Subject 5 -->
                <div class="flex flex-col space-y-2 border p-3 rounded-lg bg-gray-50 shadow-sm">
                    <label for="subjectName_4" class="text-sm font-semibold text-gray-600">Subject Name 5</label>
                    <input type="text" id="subjectName_4" value="Chemistry" class="p-2 border border-gray-300 rounded-lg">
                    <label for="subjectMarks_4" class="text-sm font-semibold text-gray-600">Marks Obtained</label>
                    <input type="number" id="subjectMarks_4" min="0" value="81" class="p-3 border border-gray-300 rounded-lg text-center font-bold">
                </div>
                <!-- Subject 6 -->
                <div class="flex flex-col space-y-2 border p-3 rounded-lg bg-gray-50 shadow-sm">
                    <label for="subjectName_5" class="text-sm font-semibold text-gray-600">Subject Name 6</label>
                    <input type="text" id="subjectName_5" value="Biology" class="p-2 border border-gray-300 rounded-lg">
                    <label for="subjectMarks_5" class="text-sm font-semibold text-gray-600">Marks Obtained</label>
                    <input type="number" id="subjectMarks_5" min="0" value="73" class="p-3 border border-gray-300 rounded-lg text-center font-bold">
                </div>
                <!-- Subject 7 -->
                <div class="flex flex-col space-y-2 border p-3 rounded-lg bg-gray-50 shadow-sm">
                    <label for="subjectName_6" class="text-sm font-semibold text-gray-600">Subject Name 7</label>
                    <input type="text" id="subjectName_6" value="Computer Science" class="p-2 border border-gray-300 rounded-lg">
                    <label for="subjectMarks_6" class="text-sm font-semibold text-gray-600">Marks Obtained</label>
                    <input type="number" id="subjectMarks_6" min="0" value="95" class="p-3 border border-gray-300 rounded-lg text-center font-bold">
                </div>
                <!-- Subject 8 -->
                <div class="flex flex-col space-y-2 border p-3 rounded-lg bg-gray-50 shadow-sm">
                    <label for="subjectName_7" class="text-sm font-semibold text-gray-600">Subject Name 8</label>
                    <input type="text" id="subjectName_7" value="Pakistan Studies" class="p-2 border border-gray-300 rounded-lg">
                    <label for="subjectMarks_7" class="text-sm font-semibold text-gray-600">Marks Obtained</label>
                    <input type="number" id="subjectMarks_7" min="0" value="88" class="p-3 border border-gray-300 rounded-lg text-center font-bold">
                </div>
                <!-- Subject 9 -->
                <div class="flex flex-col space-y-2 border p-3 rounded-lg bg-gray-50 shadow-sm">
                    <label for="subjectName_8" class="text-sm font-semibold text-gray-600">Subject Name 9</label>
                    <input type="text" id="subjectName_8" value="Islamiat" class="p-2 border border-gray-300 rounded-lg">
                    <label for="subjectMarks_8" class="text-sm font-semibold text-gray-600">Marks Obtained</label>
                    <input type="number" id="subjectMarks_8" min="0" value="75" class="p-3 border border-gray-300 rounded-lg text-center font-bold">
                </div>
            </div>

            <button onclick="calculateResult()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition duration-200 shadow-md">
                Generate Result
            </button>
        </div>
        
        <!-- Result Card Display Area -->
        <div id="resultCard" class="border-4 border-blue-600 rounded-xl p-6 mt-10 hidden">
            <!-- Result card content will be generated here by JS -->
        </div>

        <button id="printButton" onclick="window.print()" class="hidden w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-200 mt-6 shadow-md">
            Print Result Card
        </button>
    </div>

    <!-- Custom Message Modal -->
    <div id="customModal" class="modal">
        <div class="modal-content bg-white m-auto p-6 rounded-lg shadow-xl max-w-sm text-center">
            <p id="modalMessage" class="text-lg mb-4 text-gray-800"></p>
            <button onclick="closeModal()" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded-lg">
                OK
            </button>
        </div>
    </div>

    <script>
        // Number of subjects remains constant
        const NUM_SUBJECTS = 9;

        // Custom alert function (replacing alert())
        function showAlert(message) {
            const modal = document.getElementById('customModal');
            const modalMessage = document.getElementById('modalMessage');
            modalMessage.innerText = message;
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
        }

        function closeModal() {
            document.getElementById('customModal').style.display = 'none';
        }

        // Grade Logic (Based on percentage)
        function getGrade(marks) {
            if (marks >= 90) return 'A+';
            if (marks >= 80) return 'A';
            if (marks >= 70) return 'B';
            if (marks >= 60) return 'C';
            if (marks >= 50) return 'D';
            return 'F'; // Fail
        }

        // Division Logic (Board Style)
        function getDivision(percentage) {
            if (percentage >= 60) return 'First Division';
            if (percentage >= 45) return 'Second Division';
            if (percentage >= 33) return 'Third Division';
            return 'Fail';
        }

        function calculateResult() {
            const instituteName = document.getElementById('instituteName').value;
            const logoUrl = document.getElementById('logoUrl').value;
            const studentName = document.getElementById('studentName').value;
            const rollNumber = document.getElementById('rollNumber').value;
            const className = document.getElementById('className').value;
            const dateOfIssue = document.getElementById('dateOfIssue').value;
            
            const resultCardDiv = document.getElementById('resultCard');
            const printButton = document.getElementById('printButton');

            // Read dynamic Max Marks per Subject
            const marksPerSubjectInput = document.getElementById('marksPerSubject');
            const TOTAL_MARKS_PER_SUBJECT = parseInt(marksPerSubjectInput.value);

            // Calculate dynamic Passing Marks (40% of Max Marks)
            const PASSING_MARKS = Math.ceil(TOTAL_MARKS_PER_SUBJECT * 0.40);
            
            let totalObtainedMarks = 0;
            let isFailed = false;
            let marksData = [];
            let isValid = true; 

            // Basic validation for Max Marks per Subject
            if (isNaN(TOTAL_MARKS_PER_SUBJECT) || TOTAL_MARKS_PER_SUBJECT < 10) {
                showAlert(`Please enter a valid Max Marks Per Subject (minimum 10).`);
                isValid = false;
            }

            if (!isValid) {
                resultCardDiv.style.display = 'none';
                printButton.style.display = 'none';
                return;
            }

            // 1. Calculate all marks by looping through 9 dynamic inputs
            for (let i = 0; i < NUM_SUBJECTS; i++) {
                const nameInput = document.getElementById(`subjectName_${i}`);
                const marksInput = document.getElementById(`subjectMarks_${i}`);
                
                if (!nameInput || !marksInput) continue;

                const subjectName = nameInput.value || `Subject ${i + 1}`;
                const marks = parseInt(marksInput.value);

                if (isNaN(marks) || marks < 0 || marks > TOTAL_MARKS_PER_SUBJECT) {
                    showAlert(`Please enter valid marks for ${subjectName} (0-${TOTAL_MARKS_PER_SUBJECT}).`);
                    isValid = false;
                    break;
                }

                const grade = getGrade(Math.ceil((marks / TOTAL_MARKS_PER_SUBJECT) * 100)); // Grade based on relative percentage
                if (marks < PASSING_MARKS) {
                    isFailed = true;
                }
                totalObtainedMarks += marks;
                
                marksData.push({
                    name: subjectName,
                    obtained: marks,
                    total: TOTAL_MARKS_PER_SUBJECT,
                    grade: grade,
                    status: marks >= PASSING_MARKS ? 'Pass' : 'Fail'
                });
            }

            // Prevent generation if input is invalid
            if (!isValid) {
                resultCardDiv.style.display = 'none';
                printButton.style.display = 'none';
                return;
            }

            const grandTotalMarks = NUM_SUBJECTS * TOTAL_MARKS_PER_SUBJECT; // 9 * Max Marks
            const percentage = ((totalObtainedMarks / grandTotalMarks) * 100).toFixed(2);
            const finalResult = isFailed ? 'FAIL' : 'PASS';
            
            // Determine Overall Grade and Division
            const overallGrade = getGrade(parseInt(percentage));
            const division = getDivision(parseFloat(percentage));

            // 2. Prepare Result Card HTML (Board Style)
            let marksTableHTML = `
                <table class="w-full border-2 border-gray-700 border-collapse mt-4 text-sm md:text-base">
                    <thead>
                        <tr class="bg-gray-100">
                            <th class="border border-gray-400 p-3 text-left">Subject</th>
                            <th class="border border-gray-400 p-3 w-1/6">Total Marks</th>
                            <th class="border border-gray-400 p-3 w-1/6">Marks Obtained</th>
                            <th class="border border-gray-400 p-3 w-1/6">Grade</th>
                            <th class="border border-gray-400 p-3 w-1/6">Status</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            marksData.forEach(item => {
                const statusColor = item.status === 'Fail' ? 'text-red-600' : 'text-green-600';
                marksTableHTML += `
                    <tr>
                        <td class="border border-gray-300 p-3 text-left">${item.name}</td>
                        <td class="border border-gray-300 p-3 text-center">${item.total}</td>
                        <td class="border border-gray-300 p-3 text-center font-semibold">${item.obtained}</td>
                        <td class="border border-gray-300 p-3 text-center">${item.grade}</td>
                        <td class="border border-gray-300 p-3 text-center font-bold ${statusColor}">${item.status}</td>
                    </tr>
                `;
            });

            // Summary Row for Board Result look
            marksTableHTML += `
                <tr class="bg-blue-50 font-extrabold text-blue-800">
                    <td class="border border-gray-400 p-3 text-left">GRAND TOTAL:</td>
                    <td class="border border-gray-400 p-3 text-center">${grandTotalMarks}</td>
                    <td class="border border-gray-400 p-3 text-center">${totalObtainedMarks}</td>
                    <td class="border border-gray-400 p-3 text-center" colspan="2"></td>
                </tr>
            `;

            marksTableHTML += `
                    </tbody>
                </table>
            `;

            // Logo HTML (with fallback)
            const logoHtml = logoUrl 
                ? `<img src="${logoUrl}" alt="Institute Logo" class="institute-logo w-28 h-28 object-cover mx-auto mb-3 border-4 border-red-400 shadow-lg" onerror="this.onerror=null;this.src='https://placehold.co/112x112/cccccc/333333?text=NO+LOGO';" />`
                : `<div class="institute-logo w-28 h-28 bg-gray-200 text-center flex items-center justify-center mx-auto mb-3 text-sm text-gray-500 border-4 border-red-400">NO LOGO</div>`;


            // Final Result Card Display (with prominent Division)
            resultCardDiv.innerHTML = `
                <div class="card-header text-center mb-8 border-b-4 border-red-600 pb-4">
                    ${logoHtml}
                    <h1 class="text-4xl font-extrabold text-red-700 mt-2 mb-1 uppercase">${instituteName}</h1>
                    <h2 class="text-2xl font-bold text-blue-600 border-t border-b py-1 my-2">ANNUAL EXAMINATION RESULT CARD</h2>
                </div>
                
                <div class="student-info border-2 border-gray-600 p-4 rounded-lg mb-6 shadow-md grid grid-cols-2 md:grid-cols-4 gap-y-2 text-gray-800 font-medium text-sm md:text-base">
                    <p><strong>Student Name:</strong> <span class="text-blue-700">${studentName}</span></p>
                    <p><strong>Roll Number:</strong> <span class="text-blue-700">${rollNumber}</span></p>
                    <p><strong>Class/Grade:</strong> <span class="text-blue-700">${className}</span></p>
                    <p><strong>Date of Issue:</strong> <span class="text-blue-700">${dateOfIssue}</span></p>
                </div>

                <h3 class="text-xl font-bold text-gray-700 mb-2 border-b pb-1">Marks Details</h3>
                <p class="text-sm text-gray-600 mb-2 italic">Minimum passing marks per subject: ${PASSING_MARKS}</p>
                ${marksTableHTML}

                <div class="summary bg-gray-50 border-2 border-gray-700 p-4 flex flex-wrap justify-between font-bold mt-6 text-base md:text-xl rounded-lg">
                    <p class="w-full md:w-1/3 mb-2"><strong>Percentage:</strong> <span class="text-red-600">${percentage}%</span></p>
                    <p class="w-full md:w-1/3 mb-2"><strong>Overall Grade:</strong> <span class="text-red-600">${overallGrade}</span></p>
                    <p class="w-full md:w-1/3 mb-2"><strong>Result Status:</strong> <span class="text-3xl font-extrabold" style="color: ${finalResult === 'FAIL' ? '#dc2626' : '#10b981'};">${finalResult}</span></p>
                    
                    <div class="w-full mt-4 text-center border-t pt-3">
                        <p class="text-2xl font-extrabold text-indigo-700">DIVISION: <span class="text-3xl">${division.toUpperCase()}</span></p>
                    </div>
                </div>

                <p class="text-right text-sm mt-8 text-gray-500 italic border-t pt-4">Note: This result is provisional. Contact the institute for verification in case of any discrepancy.</p>
            `;

            // 3. Display and Print button
            resultCardDiv.style.display = 'block';
            printButton.style.display = 'block';
        }
    </script>
</body>
</html>
